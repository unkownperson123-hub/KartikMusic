name: The Alone Repo CI

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  full-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.13"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Verify uv
        run: uv --version

      - name: Generate uv.lock
        run: |
          rm -f uv.lock
          uv lock --prerelease=allow

      - name: Sync dependencies
        run: uv sync

      - name: Format python files
        run: |
          uvx ruff format .
          uvx ruff check . --select I --fix --exit-zero

      - name: Ruff auto fix
        run: |
          uvx ruff check . --fix --unsafe-fixes --exit-zero

      - name: Detect changes
        id: git-check
        shell: bash
        run: |
          uv lock --check --prerelease=allow || true
          if [ -n "$(git status --porcelain)" ]; then
            echo "CHANGED=true" >> $GITHUB_ENV
          else
            echo "CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Dependency audit
        continue-on-error: true
        run: uvx pip-audit

      - name: Create Pull Request
        if: env.CHANGED == 'true' && github.actor != 'github-actions[bot]'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "auto repo fix"
          title: "Automated repo auto-fix"
          body: |
            Auto dependency sync
            uv.lock regenerated
            Formatting applied with Ruff
            Security audit done
          labels: auto-fix
          branch: repo-auto-check-${{ github.run_id }}
          delete-branch: true
          

name: Code Scanner and Fixer

on:
  push:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Direct push ke liye sirf write permission chahiye

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Verify uv
        run: uv --version

      - name: Check or Initialize pyproject.toml
        shell: bash
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "pyproject.toml missing! Creating a default one..."
            uv init --bare
            uv add httpx
          fi

      - name: Generate and Sync uv.lock
        run: |
          rm -f uv.lock
          uv lock --prerelease=allow
          uv sync

      - name: Run Ruff Format and Lint Checks
        run: |
          uvx ruff format .
          uvx ruff check . --select I --fix --exit-zero
          uvx ruff check . --fix --unsafe-fixes --exit-zero

      - name: Dependency Security Audit
        continue-on-error: true
        run: uvx pip-audit

      - name: Direct Commit and Push to Master
        shell: bash
        run: |
          # Bot account settings setup
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Checking changes
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected! Pushing directly to master..."
            git add -A
            git commit -m "chore: auto fix linting, dependencies and bugs with uv & ruff"
            git push origin master
          else
            echo "Everything is clean. No changes to push!"
          fi
          

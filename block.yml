name: Code Scanner and Fixer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Check and Fix
        run: ruff check --fix . || true

      - name: Run Ruff Format
        run: ruff format . || true

      - name: Check for Changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto fix linting and bugs with ruff"
          title: "Automated Bug Fixes and Linting"
          body: |
            This is an automated pull request generated by the Code Scanner and Fixer workflow.
            It has applied automatic fixes using `ruff`.
          branch: auto-fix-linting
          base: main
          delete-branch: true
